name: QQQ MA Alert

on:
  schedule:
    # UTC 일~금 22:30 = KST 월~토 07:30 (UTC+9)
    - cron: '30 22 * * 0-5'
  workflow_dispatch:  # 수동 실행 (테스트용)

jobs:
  run-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: write  # state.json 커밋을 위해 필요

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run QQQ alert job
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        run: python alert_job.py

      - name: Commit state.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          if git diff --cached --quiet; then
            echo "state.json 변경 없음 — 커밋 스킵"
          else
            git commit -m "chore: update state.json [skip ci]"
            git push
          fi
